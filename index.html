<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro GPS</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Registro GPS</h1>

<div class="card">

    <h2>Posición actual</h2>

    <p><b>Latitud:</b> <span id="lat">-</span></p>
    <p><b>Longitud:</b> <span id="lon">-</span></p>
    <p><b>Altitud:</b> <span id="alt">-</span></p>

    <button id="btnGps">Actualizar GPS</button>
    <button id="btnAdd">Añadir ubicación</button>
    <button id="btnEdit">Editar ubicaciones</button>
    <button id="btnCsv">Exportar CSV</button>

</div>

<div id="panelListado" class="hidden">

    <h2>Ubicaciones guardadas</h2>

    <table id="tabla">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Lugar</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<div id="panelEdicion" class="hidden">

    <h2>Editar ubicación</h2>

    <input type="hidden" id="idx">

    <label>Longitud</label>
    <input id="eLon">

    <label>Latitud</label>
    <input id="eLat">

    <label>Altitud</label>
    <input id="eAlt">

    <label>Fecha</label>
    <input id="eFecha">

    <label>Hora</label>
    <input id="eHora">

    <label>Provincia</label>
    <input id="eProvincia">

    <label>Lugar</label>
    <input id="eLugar">

    <label>Notas</label>
    <textarea id="eNotas"></textarea>

    <button id="btnUpdate">
        Actualizar
    </button>

</div>

<script src="app.js"></script>

</body>
</html>
